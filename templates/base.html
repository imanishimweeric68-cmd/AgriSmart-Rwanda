{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriSmart Rwanda</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- NAVBAR -->
<header>
    <nav>
        <h1>🌱 AgriSmart Rwanda</h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/#products">Products</a></li>
            <li><a href="#">Farmers</a></li>
            <li><a href="#">Contact</a></li>

            {% if user.is_authenticated %}
                <li><a href="/accounts/logout/">Logout</a></li>
            {% else %}
                <li><a href="/accounts/login/">Login</a></li>
                <li><a href="/accounts/register/">Register</a></li>
            {% endif %}
        </ul>
    </nav>
</header>

<!-- PAGE CONTENT -->
<main>
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 AgriSmart Rwanda</p>
</footer>

</body>
</html>
