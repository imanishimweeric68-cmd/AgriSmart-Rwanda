{% extends 'base.html' %}

{% block content %}

<div class="product-detail">

    <h1>{{ product.name }}</h1>

    <p class="description">
        {{ product.description }}
    </p>

    <div class="price">
        {{ product.price }} RWF
    </div>

    <a class="btn" href="/">
        ← Back to Products
    </a>

</div>

{% endblock %}
