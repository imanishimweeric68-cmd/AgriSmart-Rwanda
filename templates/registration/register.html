{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <h2>Register</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Create Account</button>
    </form>

    <p>Already have an account?
        <a href="/accounts/login/">Login</a>
    </p>
</div>
{% endblock %}
